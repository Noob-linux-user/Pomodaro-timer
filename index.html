<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pomodoro Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
        :root {
            /* Light Mode */
            --color-surface: #f1f1f1;
            --color-text: #37352f;
            --color-text-secondary: #626060;
            --color-border: #e5e5e5;
            --color-accent: #0084ff;
            --color-hover: #f8f8f8;
            --widget-shadow: 0 6px 16px rgba(0, 0, 0, 0.08); /* New light shadow */
            color-scheme: light;
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --color-surface: #202020;
            --color-text: #e0e0e0;
            --color-text-secondary: #9a9a9a;
            --color-border: #3d3d3d;
            --color-accent: #2898ff;
            --color-hover: #2a2a2a;
            --widget-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); /* New deep dark shadow */
            color-scheme: dark;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 780px;
            display: flex;
            justify-content: center; /* Centers the newly fitted widget */
        }

        .weather-widget {
            background: var(--color-surface);
            border-radius: 14px;
            box-shadow: var(--widget-shadow);
            border: 1px solid var(--color-border);
            overflow: hidden;
            animation: slideIn 0.4s ease-out;
            width: fit-content; /* Pulls the frame tight to the content */
            max-width: 100%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--color-hover);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--color-text);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            filter: brightness(1.05);
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 6px 8px;
        }

        .hamburger span {
            width: 18px;
            height: 2px;
            background: var(--color-text);
            border-radius: 99px;
            transition: all 0.25s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }

        .search-section {
            padding: 0 18px;
            background: var(--color-surface);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease, padding-top 0.25s ease, padding-bottom 0.25s ease;
        }

        .search-section.active {
            max-height: 120px;
            padding-top: 10px;
            padding-bottom: 12px;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 13px;
            background: var(--color-hover);
            color: var(--color-text);
        }

        .search-box input::placeholder {
            color: var(--color-text-secondary);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-accent);
            background: var(--color-surface);
        }

        .search-box button {
            padding: 8px 14px;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .search-box button:hover {
            filter: brightness(1.05);
        }

        .use-current-location {
            font-size: 12px;
            color: var(--color-accent);
            text-align: left;
            padding-top: 6px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .use-current-location:hover {
            opacity: 0.8;
        }

        .weather-layout {
            display: flex;
            padding: 18px;
            gap: 24px;
            background: var(--color-surface);
            flex-wrap: nowrap;
        }

        /* FIXED LEFT PANEL */
        .today-panel {
            flex: 0 0 auto;
            min-width: 200px;
            border-right: 1px solid var(--color-border);
            padding-right: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .location-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .current-date {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
        }

        .today-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .weather-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .today-temp-block {
            text-align: left;
        }

        .temperature {
            font-size: 40px;
            font-weight: 700;
            color: var(--color-text);
            line-height: 1;
            margin-bottom: 4px;
        }

        .weather-description {
            font-size: 14px;
            color: var(--color-text-secondary);
            text-transform: capitalize;
        }

        /* SCROLLABLE RIGHT PANEL */
        .right-forecast {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .right-forecast::-webkit-scrollbar {
            height: 6px;
        }
        .right-forecast::-webkit-scrollbar-track {
            background: transparent;
        }
        .right-forecast::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 10px;
        }

        .forecast-card {
            flex: 0 0 auto;
            width: 76px;
            background: var(--color-hover);
            border-radius: 10px;
            border: 1px solid var(--color-border);
            padding: 10px 6px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .forecast-card:hover {
            background: var(--color-border);
            transform: translateY(-2px);
        }

        .forecast-day {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 4px;
        }

        .forecast-icon {
            width: 28px;
            height: 28px;
            margin: 4px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forecast-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .forecast-high {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 2px;
        }

        .forecast-low {
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
            background: var(--color-surface);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }

        @media (max-width: 720px) {
            .container {
                max-width: 100%;
            }
            .weather-layout {
                gap: 16px;
                padding: 14px;
            }
            .today-panel {
                min-width: 160px;
                padding-right: 16px;
            }
        }
    </style>
</head>
<body>
  <div id="root">
    <div class="app" id="app">
      <div class="top-bar">
        <div class="title">Pomodoro</div>
        <div class="top-actions">
          <button class="icon-btn" id="themeToggle" title="Toggle theme">
            🌙
          </button>
          <button class="icon-btn" id="menuToggle" title="Settings">
            ☰
          </button>
        </div>
      </div>

      <div class="label" id="phaseLabel">Work</div>
      <div class="time" id="timeDisplay">25:00</div>

      <div class="pill-row">
        <div class="pill pill--accent" id="sessionPill">
          #1 • Work
        </div>
        <div class="pill" id="cyclePill">
          4 until long
        </div>
      </div>

      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="controls">
        <button class="btn-main" id="startPauseBtn">Start</button>
        <button class="btn-small" id="resetBtn">Reset</button>
      </div>

      <div class="settings-panel" id="settingsPanel">
        <div class="settings-group">
          <label class="settings-label">Work Duration</label>
          <div class="settings-row">
            <label>Minutes</label>
            <div class="value-control">
              <button class="value-btn" id="workMinus">−</button>
              <input type="number" class="value-input" id="workInput" value="25" min="1" max="60" />
              <button class="value-btn" id="workPlus">+</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label">Short Break</label>
          <div class="settings-row">
            <label>Minutes</label>
            <div class="value-control">
              <button class="value-btn" id="breakMinus">−</button>
              <input type="number" class="value-input" id="breakInput" value="5" min="1" max="60" />
              <button class="value-btn" id="breakPlus">+</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label">Long Break</label>
          <div class="settings-row">
            <label>Minutes</label>
            <div class="value-control">
              <button class="value-btn" id="longBreakMinus">−</button>
              <input type="number" class="value-input" id="longBreakInput" value="15" min="1" max="60" />
              <button class="value-btn" id="longBreakPlus">+</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label">Pomodoros Until Long Break</label>
          <div class="settings-row">
            <label>Count</label>
            <div class="value-control">
              <button class="value-btn" id="cyclesMinus">−</button>
              <input type="number" class="value-input" id="cyclesInput" value="4" min="1" max="12" />
              <button class="value-btn" id="cyclesPlus">+</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <label class="settings-label">Theme</label>
          <div class="settings-row">
            <select class="theme-select" id="themeMode">
              <option value="auto">Auto (system)</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById("app");
    const phaseLabel = document.getElementById("phaseLabel");
    const timeDisplay = document.getElementById("timeDisplay");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const progressBar = document.getElementById("progressBar");
    const sessionPill = document.getElementById("sessionPill");
    const cyclePill = document.getElementById("cyclePill");
    const menuToggle = document.getElementById("menuToggle");
    const settingsPanel = document.getElementById("settingsPanel");
    const themeToggle = document.getElementById("themeToggle");
    const themeModeSelect = document.getElementById("themeMode");

    const workInput = document.getElementById("workInput");
    const breakInput = document.getElementById("breakInput");
    const longBreakInput = document.getElementById("longBreakInput");
    const cyclesInput = document.getElementById("cyclesInput");

    const workPlus = document.getElementById("workPlus");
    const workMinus = document.getElementById("workMinus");
    const breakPlus = document.getElementById("breakPlus");
    const breakMinus = document.getElementById("breakMinus");
    const longBreakPlus = document.getElementById("longBreakPlus");
    const longBreakMinus = document.getElementById("longBreakMinus");
    const cyclesPlus = document.getElementById("cyclesPlus");
    const cyclesMinus = document.getElementById("cyclesMinus");

    let intervalId = null;
    let isRunning = false;
    let phase = "work"; // 'work' | 'short' | 'long'
    let secondsLeft = 25 * 60;
    let baseDuration = 25 * 60;
    let completedPomodoros = 0;

    let workMinutes = 25;
    let breakMinutes = 5;
    let longBreakMinutes = 15;
    let cyclesUntilLong = 4;

    const STORAGE_KEY = "pomoWidgetSettings_v1";

    let audioContext = null;

    function initAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playBeep(frequency = 800, duration = 200) {
      initAudioContext();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = frequency;
      oscillator.type = "sine";
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + duration / 1000);
    }

    function playStartSound() {
      playBeep(600, 100);
    }

    function playWorkEndSound() {
      playBeep(800, 200);
    }

    function playBreakEndSound() {
      playBeep(800, 150);
      setTimeout(() => playBeep(800, 150), 200);
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (typeof s.work === "number") workMinutes = s.work;
        if (typeof s.break === "number") breakMinutes = s.break;
        if (typeof s.long === "number") longBreakMinutes = s.long;
        if (typeof s.cycles === "number") cyclesUntilLong = s.cycles;
        if (s.themeMode) themeModeSelect.value = s.themeMode;
        updateDisplayValues();
      } catch (e) {}
    }

    function saveSettings() {
      const data = {
        work: workMinutes,
        break: breakMinutes,
        long: longBreakMinutes,
        cycles: cyclesUntilLong,
        themeMode: themeModeSelect.value,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateDisplayValues() {
      workInput.value = workMinutes;
      breakInput.value = breakMinutes;
      longBreakInput.value = longBreakMinutes;
      cyclesInput.value = cyclesUntilLong;
    }

    function getSystemTheme() {
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        return "dark";
      }
      return "light";
    }

    function applyTheme() {
      const mode = themeModeSelect.value;
      let effective = mode === "auto" ? getSystemTheme() : mode;
      app.classList.remove("theme-light", "theme-dark");
      app.classList.add(effective === "dark" ? "theme-dark" : "theme-light");
      themeToggle.textContent = effective === "dark" ? "☀️" : "🌙";

      // --- Notion Background Fix ---
      try {
        document.body.style.background = effective === "dark" ? '#191919' : '#ffffff';
        document.body.style.transition = 'background 0.3s ease';
      } catch (e) {
        document.body.style.background = '#ffffff';
      }
    }

    function syncThemeWithSystem() {
      if (themeModeSelect.value !== "auto") return;
      applyTheme();
    }

    if (window.matchMedia) {
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", syncThemeWithSystem);
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60)
        .toString()
        .padStart(2, "0");
      const s = (sec % 60).toString().padStart(2, "0");
      return m + ":" + s;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(secondsLeft);
      progressBar.style.width =
        100 * (1 - secondsLeft / baseDuration) + "%";

      const currentCycle = (completedPomodoros % cyclesUntilLong) + 1;

      if (phase === "work") {
        phaseLabel.textContent = "Work";
        sessionPill.textContent = "#" + currentCycle + " • Work";
      } else if (phase === "short") {
        phaseLabel.textContent = "Break";
        sessionPill.textContent = "Short break";
      } else {
        phaseLabel.textContent = "Long break";
        sessionPill.textContent = "Long break";
      }

      cyclePill.textContent = cyclesUntilLong + " until long";
    }

    function setPhase(newPhase) {
      phase = newPhase;
      let mins;
      if (phase === "work") {
        mins = workMinutes;
      } else if (phase === "short") {
        mins = breakMinutes;
      } else {
        mins = longBreakMinutes;
      }
      baseDuration = mins * 60;
      secondsLeft = baseDuration;
      updateDisplay();
    }

    function nextPhase() {
      if (phase === "work") {
        completedPomodoros += 1;
        playWorkEndSound();
        if (completedPomodoros % cyclesUntilLong === 0) {
          setPhase("long");
        } else {
          setPhase("short");
        }
      } else {
        playBreakEndSound();
        setPhase("work");
      }
    }

    function tick() {
      if (!isRunning) return;
      secondsLeft -= 1;
      if (secondsLeft <= 0) {
        secondsLeft = 0;
        updateDisplay();
        clearInterval(intervalId);
        isRunning = false;
        startPauseBtn.textContent = "Start";
        nextPhase();
        startTimer();
        return;
      }
      updateDisplay();
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startPauseBtn.textContent = "Pause";
      playStartSound();
      intervalId = setInterval(tick, 1000);
    }

    function pauseTimer() {
      isRunning = false;
      startPauseBtn.textContent = "Start";
      clearInterval(intervalId);
    }

    function resetTimer() {
      pauseTimer();
      completedPomodoros = 0;
      setPhase("work");
    }

    startPauseBtn.addEventListener("click", () => {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", () => {
      resetTimer();
    });

    menuToggle.addEventListener("click", () => {
      const isOpen = settingsPanel.style.display === "block";
      settingsPanel.style.display = isOpen ? "none" : "block";
    });

    workPlus.addEventListener("click", () => {
      workMinutes = Math.min(workMinutes + 1, 60);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "work") setPhase("work");
    });

    workMinus.addEventListener("click", () => {
      workMinutes = Math.max(workMinutes - 1, 1);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "work") setPhase("work");
    });

    workInput.addEventListener("change", () => {
      const val = Math.min(Math.max(parseInt(workInput.value) || 25, 1), 60);
      workMinutes = val;
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "work") setPhase("work");
    });

    breakPlus.addEventListener("click", () => {
      breakMinutes = Math.min(breakMinutes + 1, 60);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "short") setPhase("short");
    });

    breakMinus.addEventListener("click", () => {
      breakMinutes = Math.max(breakMinutes - 1, 1);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "short") setPhase("short");
    });

    breakInput.addEventListener("change", () => {
      const val = Math.min(Math.max(parseInt(breakInput.value) || 5, 1), 60);
      breakMinutes = val;
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "short") setPhase("short");
    });

    longBreakPlus.addEventListener("click", () => {
      longBreakMinutes = Math.min(longBreakMinutes + 1, 60);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "long") setPhase("long");
    });

    longBreakMinus.addEventListener("click", () => {
      longBreakMinutes = Math.max(longBreakMinutes - 1, 1);
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "long") setPhase("long");
    });

    longBreakInput.addEventListener("change", () => {
      const val = Math.min(Math.max(parseInt(longBreakInput.value) || 15, 1), 60);
      longBreakMinutes = val;
      updateDisplayValues();
      saveSettings();
      if (!isRunning && phase === "long") setPhase("long");
    });

    cyclesPlus.addEventListener("click", () => {
      cyclesUntilLong = Math.min(cyclesUntilLong + 1, 12);
      updateDisplayValues();
      saveSettings();
      updateDisplay();
    });

    cyclesMinus.addEventListener("click", () => {
      cyclesUntilLong = Math.max(cyclesUntilLong - 1, 1);
      updateDisplayValues();
      saveSettings();
      updateDisplay();
    });

    cyclesInput.addEventListener("change", () => {
      const val = Math.min(Math.max(parseInt(cyclesInput.value) || 4, 1), 12);
      cyclesUntilLong = val;
      updateDisplayValues();
      saveSettings();
      updateDisplay();
    });

    themeModeSelect.addEventListener("change", () => {
      saveSettings();
      applyTheme();
    });

    themeToggle.addEventListener("click", () => {
      const current = themeModeSelect.value;
      if (current === "auto") {
        themeModeSelect.value =
          getSystemTheme() === "dark" ? "light" : "dark";
      } else if (current === "light") {
        themeModeSelect.value = "dark";
      } else {
        themeModeSelect.value = "light";
      }
      saveSettings();
      applyTheme();
    });

    loadSettings();
    applyTheme();
    setPhase("work");
  </script>
</body>
</html>
